services:
  # Backend Service
  - type: web
    name: indent-clinic-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    rootDir: indent-clinic-backend-main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Manual entry in the dashboard

  # Frontend Service
  - type: web
    name: indent-clinic-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: indent-clinic-frontend-main
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: indent-clinic-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
